<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Recetas — Nora Real Food</title>
  <style>
    :root {
      --navy: #192850;
      --navy2: #2c3e6b;
      --accent: #e84c20;
      --accent2: #ff6b3d;
      --bg: #f0f2f7;
      --panel: #ffffff;
      --border: #dde2ee;
      --text: #1a2233;
      --muted: #6b7a99;
      --sub: #3a6dbf;
      --sub-bg: #eaf1fb;
      --ing-bg: #f8f9fc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ─────────────────────────────────── */
    header {
      background: var(--navy); color: #fff;
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.5rem; height: 56px; flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }
    .logo-ring {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; color: #fff; flex-shrink: 0;
    }
    header h1 { font-size: .95rem; font-weight: 600; letter-spacing: .03em; flex: 1; }
    .btn-config {
      background: var(--accent); color: #fff; border: none;
      padding: .45rem 1.1rem; border-radius: 5px; font-size: .85rem;
      font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: .4rem;
      transition: background .15s;
    }
    .btn-config:hover { background: var(--accent2); }
    .btn-config:disabled { background: #555; cursor: default; }

    /* ── Portions bar ───────────────────────────── */
    .portions-bar {
      display: flex; align-items: center; gap: .75rem;
      background: #f5f7fd; border: 1.5px solid var(--border);
      border-radius: 8px; padding: .5rem .85rem;
      margin-bottom: 1rem;
    }
    .portions-bar label { font-size: .82rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .portions-input {
      width: 110px; padding: .45rem .7rem;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 1.1rem; font-weight: 700; color: var(--navy2); text-align: center;
      transition: border-color .15s;
    }
    .portions-input:focus { outline: none; border-color: var(--navy2); }
    .portions-hint { font-size: .8rem; color: var(--muted); }
    .portions-total {
      margin-left: auto; font-size: .82rem; font-weight: 600;
      color: var(--navy2); background: var(--sub-bg);
      padding: .3rem .75rem; border-radius: 5px;
      display: none;
    }

    /* ── Layout ─────────────────────────────────── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ────────────────────────────────── */
    .sidebar {
      width: 300px; flex-shrink: 0;
      background: var(--navy2); color: #e8edf8;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-top { padding: .75rem .75rem .5rem; }
    .search-wrap {
      position: relative;
    }
    .search-wrap svg { position: absolute; left: .6rem; top: 50%; transform: translateY(-50%); opacity: .5; pointer-events: none; }
    #search-input {
      width: 100%; padding: .5rem .75rem .5rem 2rem;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18);
      border-radius: 6px; color: #fff; font-size: .85rem;
    }
    #search-input::placeholder { color: rgba(255,255,255,.5); }
    #search-input:focus { outline: none; background: rgba(255,255,255,.18); }
    .list-header {
      padding: .5rem .75rem .35rem;
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: rgba(255,255,255,.45);
      display: flex; justify-content: space-between;
    }
    #recipe-list {
      flex: 1; overflow-y: auto; padding: 0 .4rem .75rem;
    }
    #recipe-list::-webkit-scrollbar { width: 4px; }
    #recipe-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }
    .recipe-item {
      padding: .55rem .6rem;
      border-radius: 6px; cursor: pointer;
      transition: background .12s;
      border-left: 3px solid transparent;
      margin-bottom: 2px;
    }
    .recipe-item:hover { background: rgba(255,255,255,.1); }
    .recipe-item.active { background: rgba(255,255,255,.15); border-left-color: var(--accent); }
    .recipe-item .rname { font-size: .85rem; font-weight: 500; color: #eef2ff; line-height: 1.3; }
    .recipe-item .rcode { font-size: .72rem; color: rgba(255,255,255,.45); margin-top: 1px; }
    .loading-sidebar { text-align: center; padding: 2rem 1rem; color: rgba(255,255,255,.5); font-size: .85rem; }
    .load-more { text-align: center; padding: .5rem; }
    .load-more button {
      background: none; border: 1px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.6); font-size: .75rem; padding: .3rem .9rem;
      border-radius: 4px; cursor: pointer;
    }
    .load-more button:hover { background: rgba(255,255,255,.1); }

    /* ── Detail panel ───────────────────────────── */
    .detail { flex: 1; overflow-y: auto; padding: 1.5rem; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--muted); text-align: center; gap: .75rem;
    }
    .empty-state svg { opacity: .25; }
    .empty-state p { font-size: .9rem; }

    .recipe-header {
      background: var(--panel); border-radius: 10px; padding: 1.25rem 1.5rem;
      margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.07);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;
    }
    .recipe-title { font-size: 1.2rem; font-weight: 700; color: var(--navy); margin-bottom: .35rem; }
    .recipe-meta { display: flex; gap: 1rem; flex-wrap: wrap; }
    .meta-chip {
      background: var(--sub-bg); color: var(--navy2);
      font-size: .78rem; font-weight: 600; padding: .25rem .65rem;
      border-radius: 4px;
    }

    .section-card {
      background: var(--panel); border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07); overflow: hidden;
    }
    .section-head {
      padding: .75rem 1.25rem; border-bottom: 1px solid var(--border);
      font-size: .8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted);
      display: flex; align-items: center; gap: .5rem;
    }
    .badge-count {
      background: var(--navy2); color: #fff;
      border-radius: 999px; font-size: .68rem; padding: .1rem .45rem;
    }

    table { width: 100%; border-collapse: collapse; font-size: .86rem; }
    thead th {
      padding: .55rem 1rem; text-align: left;
      background: #f5f7fc; font-weight: 600; color: var(--muted);
      font-size: .76rem; text-transform: uppercase; letter-spacing: .04em;
      border-bottom: 1px solid var(--border);
    }
    thead th.right { text-align: right; }
    tbody td { padding: .55rem 1rem; border-bottom: 1px solid #f2f4fa; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbff; }
    tbody tr.row-sub td { background: var(--sub-bg); }
    tbody tr.row-sub:hover td { background: #dce8f8; }

    /* ── PE toggle button ───────────────────────── */
    .pe-toggle {
      background: none; border: 1.5px solid #b0c4e8; border-radius: 4px;
      width: 20px; height: 20px; font-size: .65rem; cursor: pointer;
      color: var(--navy2); line-height: 1; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .12s, transform .18s; flex-shrink: 0;
      vertical-align: middle; margin-right: .45rem;
    }
    .pe-toggle:hover { background: #d4e4fb; }
    .pe-toggle.open { transform: rotate(90deg); background: var(--navy2); color: #fff; border-color: var(--navy2); }

    /* ── Nested PE rows ─────────────────────────── */
    tr.pe-child td { background: #f0f5ff; border-bottom: 1px solid #e0e8f8; font-size: .82rem; }
    tr.pe-child:hover td { background: #e8effc; }
    tr.pe-child td:first-child { padding-left: 2.8rem; color: var(--muted); }
    tr.pe-child .type-badge { opacity: .75; }
    tr.pe-child .qty-total { color: #2563eb; }
    .pe-child-loading td { color: var(--muted); font-style: italic; padding-left: 2.8rem; }

    .type-badge {
      display: inline-block; padding: .18rem .55rem; border-radius: 4px;
      font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
    }
    .type-sub { background: #d4e4fb; color: #1d4ed8; }
    .type-ing { background: #e6faf0; color: #166534; }

    .qty-cell { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
    .qty-total { color: var(--navy2); font-weight: 700; }
    .unit-cell { color: var(--muted); font-size: .82rem; }

    /* ── Modal ──────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: #fff; border-radius: 12px; padding: 1.75rem;
      width: 400px; max-width: 95vw;
      transform: translateY(-16px); transition: transform .2s;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .overlay.open .modal { transform: translateY(0); }
    .modal h3 { font-size: 1.05rem; font-weight: 700; color: var(--navy); margin-bottom: 1.25rem; }
    .modal label { display: block; font-size: .85rem; font-weight: 600; color: var(--muted); margin-bottom: .4rem; }
    .modal input[type=number] {
      width: 100%; padding: .65rem .85rem; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 1.1rem; color: var(--text);
      transition: border-color .15s;
    }
    .modal input:focus { outline: none; border-color: var(--navy2); }
    .modal-actions { display: flex; justify-content: flex-end; gap: .75rem; margin-top: 1.5rem; }
    .btn-cancel {
      background: none; border: 1.5px solid var(--border); color: var(--muted);
      padding: .5rem 1.1rem; border-radius: 7px; font-size: .88rem; cursor: pointer;
    }
    .btn-validate {
      background: var(--navy2); color: #fff; border: none;
      padding: .5rem 1.4rem; border-radius: 7px; font-size: .88rem;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .btn-validate:hover { background: var(--navy); }

    /* ── Scaled results panel ───────────────────── */
    #scaled-panel { margin-top: 1rem; display: none; }
    .scaled-header {
      background: var(--navy); color: #fff; border-radius: 10px 10px 0 0;
      padding: .85rem 1.25rem; display: flex; justify-content: space-between; align-items: center;
    }
    .scaled-title { font-size: .95rem; font-weight: 700; }
    .scaled-meta { font-size: .8rem; opacity: .75; }
    .btn-export {
      background: #27ae60; color: #fff; border: none;
      padding: .45rem 1.1rem; border-radius: 6px; font-size: .82rem;
      font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: .4rem;
    }
    .btn-export:hover { background: #219a52; }

    /* ── Spinner ────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; display: inline-block;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-ring">NR</div>
  <h1>GESTIÓN DE LAS RECETAS</h1>
  <button class="btn-config" id="btn-export-header" onclick="exportExcelCurrent()" disabled>
    ⬇ Exportar Excel
  </button>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-input" type="text" placeholder="Buscar una receta…" oninput="onSearch()" />
      </div>
    </div>
    <div class="list-header">
      <span>Recetas</span>
      <span id="count-label">—</span>
    </div>
    <div id="recipe-list">
      <div class="loading-sidebar">
        <div class="spinner" style="border-color:rgba(255,255,255,.2);border-top-color:rgba(255,255,255,.7);margin:0 auto .5rem"></div>
        Cargando recetas…
      </div>
    </div>
  </aside>

  <!-- Detail -->
  <main class="detail" id="detail">
    <div class="empty-state">
      <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      <p>Selecciona una receta<br>para ver sus componentes</p>
    </div>
  </main>
</div>

<script>
const API = 'http://localhost:8002';
let allRecipes = [];
let currentCode = null;
let offset = 0;
const PAGE = 80;
let totalCount = 0;
let searchTimer = null;
let calcTimer = null;
let lastPortions = null;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await fetchRecipes('', 0, true);
}

async function fetchRecipes(q, off, reset) {
  try {
    const res = await fetch(`${API}/api/recipes?search=${encodeURIComponent(q)}&limit=${PAGE}&offset=${off}`);
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    if (reset) allRecipes = data.recipes;
    else allRecipes = allRecipes.concat(data.recipes);
    totalCount = data.total;
    offset = off + data.recipes.length;
    renderList();
  } catch (e) {
    document.getElementById('recipe-list').innerHTML =
      `<div class="loading-sidebar" style="color:#ff7c7c">Error: ${e.message}<br><small>¿Está corriendo el servidor?</small></div>`;
  }
}

// ── List rendering ────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('recipe-list');
  document.getElementById('count-label').textContent = totalCount.toLocaleString('es-ES');

  const items = allRecipes.map(r => `
    <div class="recipe-item ${r.code === currentCode ? 'active' : ''}" onclick="selectRecipe('${r.code}')">
      <div class="rname">${esc(r.name)}</div>
      <div class="rcode">Código: ${r.code} &nbsp;·&nbsp; ${r.weight_per_portion}g/p</div>
    </div>
  `).join('');

  const loadMore = offset < totalCount
    ? `<div class="load-more"><button onclick="loadMore()">Cargar más (${totalCount - offset} restantes)</button></div>`
    : '';

  list.innerHTML = items + loadMore;
}

function loadMore() {
  fetchRecipes(document.getElementById('search-input').value, offset, false);
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    offset = 0;
    fetchRecipes(document.getElementById('search-input').value, 0, true);
  }, 280);
}

// ── Recipe detail ─────────────────────────────────────────────────────────────
async function selectRecipe(code) {
  currentCode = code;
  lastPortions = null;
  document.getElementById('btn-export-header').disabled = true;

  document.querySelectorAll('.recipe-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.rcode')?.textContent.includes(`Código: ${code}`));
  });

  const detail = document.getElementById('detail');
  detail.innerHTML = `<div style="color:var(--muted);padding:4rem;text-align:center">
    <div class="spinner" style="border-color:#dde2ee;border-top-color:var(--navy2);width:24px;height:24px;border-width:3px;margin:0 auto .75rem"></div>
    Cargando receta…</div>`;

  try {
    const res = await fetch(`${API}/api/recipes/${code}`);
    if (!res.ok) throw new Error(res.statusText);
    const r = await res.json();
    renderDetail(r);
  } catch (e) {
    detail.innerHTML = `<div class="empty-state"><p style="color:#e74c3c">Error: ${e.message}</p></div>`;
  }
}

function renderDetail(r) {
  window._currentRecipe = r;
  // Reset PE expand state for new recipe
  Object.keys(_peExpanded).forEach(k => delete _peExpanded[k]);
  const subs = r.components.filter(c => c.type === 'subreceta');
  const ings = r.components.filter(c => c.type === 'ingrediente');

  const compRows = r.components.map((c, i) => `
    <tr class="${c.type === 'subreceta' ? 'row-sub' : ''}" id="row-${i}" data-idx="${i}">
      <td>
        ${c.type === 'subreceta' ? `<button class="pe-toggle" id="toggle-${i}" onclick="togglePEExpand(${i})" title="Ver ingredientes de esta PE"></button>` : '<span style="display:inline-block;width:26px"></span>'}
        ${esc(c.name)}
      </td>
      <td><span class="type-badge ${c.type === 'subreceta' ? 'type-sub' : 'type-ing'}">${c.type === 'subreceta' ? 'Subreceta' : 'Ingrediente'}</span></td>
      <td class="qty-cell">${fmt(c.quantity)}</td>
      <td class="unit-cell">${c.unit}</td>
      <td class="qty-cell" id="total-${i}">—</td>
    </tr>
  `).join('');

  document.getElementById('detail').innerHTML = `
    <div class="recipe-header">
      <div>
        <div class="recipe-title">${esc(r.name)}</div>
        <div class="recipe-meta">
          <span class="meta-chip">Código: ${r.code}</span>
          <span class="meta-chip">Peso ref: ${r.weight_per_portion} g / porción</span>
          <span class="meta-chip">${subs.length} subrecetas · ${ings.length} ingredientes</span>
        </div>
      </div>
    </div>

    <div class="portions-bar">
      <label>Nº de platos</label>
      <input class="portions-input" id="portions-input" type="number" min="1" max="100000"
             placeholder="ej. 15" oninput="onPortionsInput()" onchange="onPortionsInput()" />
      <span class="portions-hint">Escribe un número → calcula automáticamente</span>
      <span class="portions-total" id="portions-total"></span>
    </div>

    <div class="section-card">
      <div class="section-head">
        Componentes
        <span class="badge-count">${r.components.length}</span>
        <span id="th-label" style="margin-left:auto;font-size:.75rem;color:var(--muted);font-weight:500">Cant. total</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Tipo</th>
            <th class="right">Cant. x1</th>
            <th>Unidad</th>
            <th class="right" id="th-total">Total</th>
          </tr>
        </thead>
        <tbody id="comp-tbody">${compRows}</tbody>
      </table>
    </div>
  `;

  document.getElementById('portions-input').focus();
}

// ── PE expand / collapse ──────────────────────────────────────────────────────
const _peCache = {};       // peName -> { components, weight_per_portion }
const _peExpanded = {};    // rowIdx -> true/false

async function togglePEExpand(idx) {
  if (_peExpanded[idx]) {
    collapsePE(idx);
  } else {
    await expandPE(idx);
  }
}

async function expandPE(idx) {
  const r = window._currentRecipe;
  if (!r) return;
  const c = r.components[idx];
  const btn = document.getElementById(`toggle-${idx}`);

  // Insert loading row
  const loadRow = document.createElement('tr');
  loadRow.id = `pe-sub-${idx}`;
  loadRow.className = 'pe-child pe-child-loading';
  loadRow.innerHTML = `<td colspan="5">Cargando ingredientes de ${esc(c.name)}…</td>`;
  insertAfterRow(idx, loadRow);
  if (btn) btn.classList.add('open');

  // Fetch PE details (cached)
  if (!_peCache[c.name]) {
    try {
      const res = await fetch(`${API}/api/recipes/by-name/${encodeURIComponent(c.name)}`);
      if (!res.ok) throw new Error('not found');
      _peCache[c.name] = await res.json();
    } catch (_) {
      loadRow.innerHTML = `<td colspan="5" style="color:#e74c3c;padding-left:2.8rem">No se encontró la ficha de "${esc(c.name)}"</td>`;
      _peExpanded[idx] = true;
      return;
    }
  }

  _peExpanded[idx] = true;
  renderPESubRows(idx);
}

function collapsePE(idx) {
  _peExpanded[idx] = false;
  const btn = document.getElementById(`toggle-${idx}`);
  if (btn) btn.classList.remove('open');
  // Remove all pe-child rows for this idx
  document.querySelectorAll(`[data-pe-parent="${idx}"]`).forEach(el => el.remove());
  const loadRow = document.getElementById(`pe-sub-${idx}`);
  if (loadRow) loadRow.remove();
}

function renderPESubRows(idx) {
  const r = window._currentRecipe;
  const c = r.components[idx];
  const pe = _peCache[c.name];
  if (!pe) return;

  // Remove old rows for this idx
  document.querySelectorAll(`[data-pe-parent="${idx}"]`).forEach(el => el.remove());
  const loadRow = document.getElementById(`pe-sub-${idx}`);
  if (loadRow) loadRow.remove();

  // Determine how many "PE portions" are needed
  const portions = lastPortions || 1;
  const totalParentQty = c.quantity * portions;   // kg or PO total of the PE
  const pePortions = calcPEPortions(totalParentQty, c.unit, pe.weight_per_portion);

  const tbody = document.getElementById('comp-tbody');
  const parentRow = document.getElementById(`row-${idx}`);

  const portionLabel = portions > 1 ? `×${portions}` : '×1';

  // Header sub-row
  const header = document.createElement('tr');
  header.setAttribute('data-pe-parent', idx);
  header.className = 'pe-child';
  header.style.cssText = 'background:#dce8f8';
  header.innerHTML = `
    <td colspan="2" style="padding-left:2.8rem;font-size:.74rem;font-weight:700;color:var(--navy2);text-transform:uppercase;letter-spacing:.05em">
      ↳ Detalle ${esc(pe.name)} — ${fmt(pePortions)} porciones de PE
    </td>
    <td class="qty-cell" style="font-size:.74rem;color:var(--muted);font-weight:600">Cant. ×1</td>
    <td style="font-size:.74rem;color:var(--muted)">Uds.</td>
    <td class="qty-cell" style="font-size:.74rem;color:var(--muted);font-weight:600">${portionLabel}</td>
  `;
  insertAfterRow(idx, header);

  // Ingredient rows (insert in reverse so they end up in order)
  [...pe.components].reverse().forEach((comp, ri) => {
    const realIdx = pe.components.length - 1 - ri;
    const total = round3(comp.quantity * pePortions);
    const row = document.createElement('tr');
    row.setAttribute('data-pe-parent', idx);
    row.setAttribute('data-pe-comp', realIdx);
    row.className = 'pe-child';
    row.innerHTML = `
      <td><span style="display:inline-block;width:26px"></span>${esc(comp.name)}</td>
      <td><span class="type-badge ${comp.type === 'subreceta' ? 'type-sub' : 'type-ing'}">${comp.type === 'subreceta' ? 'Subreceta' : 'Ingrediente'}</span></td>
      <td class="qty-cell">${fmt(comp.quantity)}</td>
      <td class="unit-cell">${comp.unit}</td>
      <td class="qty-cell qty-total" id="pe-total-${idx}-${realIdx}">${fmt(total)}</td>
    `;
    insertAfterRow(idx, row);
  });
}

function calcPEPortions(totalQty, unit, weightPerPortionGrams) {
  if (unit === 'PO') return totalQty;
  if (!weightPerPortionGrams) return totalQty;
  return round3(totalQty * 1000 / weightPerPortionGrams);
}

function insertAfterRow(idx, newRow) {
  const parentRow = document.getElementById(`row-${idx}`);
  if (!parentRow) return;
  // Find last pe-child row already inserted after this parent
  let lastSibling = parentRow;
  let next = parentRow.nextElementSibling;
  while (next && (next.getAttribute('data-pe-parent') === String(idx) || next.id === `pe-sub-${idx}`)) {
    lastSibling = next;
    next = next.nextElementSibling;
  }
  lastSibling.insertAdjacentElement('afterend', newRow);
}

// ── Auto-calculate ────────────────────────────────────────────────────────────
function onPortionsInput() {
  clearTimeout(calcTimer);
  const val = parseInt(document.getElementById('portions-input')?.value);
  if (!val || val < 1) {
    clearTotals();
    return;
  }
  // Instant update client-side, then confirm with server
  applyClientScale(val);
  calcTimer = setTimeout(() => applyServerScale(val), 400);
}

function applyClientScale(portions) {
  const r = window._currentRecipe;
  if (!r) return;
  r.components.forEach((c, i) => {
    const cell = document.getElementById(`total-${i}`);
    if (cell) {
      cell.textContent = fmt(round3(c.quantity * portions));
      cell.className = 'qty-cell qty-total';
    }
    // Refresh expanded PE sub-rows
    if (_peExpanded[i] && _peCache[c.name]) {
      const pe = _peCache[c.name];
      const totalParentQty = c.quantity * portions;
      const pePortions = calcPEPortions(totalParentQty, c.unit, pe.weight_per_portion);
      pe.components.forEach((comp, j) => {
        const subCell = document.getElementById(`pe-total-${i}-${j}`);
        if (subCell) subCell.textContent = fmt(round3(comp.quantity * pePortions));
      });
      // Update PE header label
      const headerCells = document.querySelectorAll(`[data-pe-parent="${i}"]`);
      if (headerCells.length > 0) {
        const headerTd = headerCells[0].querySelector('td');
        if (headerTd) headerTd.innerHTML = `↳ Detalle ${esc(pe.name)} — ${fmt(pePortions)} porciones de PE`;
      }
      // Update column header in header row
      const lastTd = headerCells[0]?.querySelectorAll('td');
      if (lastTd && lastTd.length >= 5) lastTd[4].textContent = `×${portions}`;
    }
  });
  document.getElementById('th-total').textContent = `x${portions}`;
  const totalKg = round3(r.weight_per_portion * portions / 1000);
  const totalEl = document.getElementById('portions-total');
  if (totalEl) {
    totalEl.style.display = 'block';
    totalEl.textContent = `Peso total aprox. ${totalKg.toLocaleString('es-ES')} kg`;
  }
  lastPortions = portions;
  document.getElementById('btn-export-header').disabled = false;
}

async function applyServerScale(portions) {
  if (!currentCode) return;
  try {
    const res = await fetch(`${API}/api/recipes/${currentCode}/scale`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ portions }),
    });
    if (!res.ok) return;
    const s = await res.json();
    s.components.forEach((c, i) => {
      const cell = document.getElementById(`total-${i}`);
      if (cell) {
        cell.textContent = fmt(c.quantity_total);
        cell.className = 'qty-cell qty-total';
      }
    });
  } catch (e) {
    console.warn('Server scale failed, showing client-side values:', e);
  }
}

function clearTotals() {
  const r = window._currentRecipe;
  if (!r) return;
  r.components.forEach((_, i) => {
    const cell = document.getElementById(`total-${i}`);
    if (cell) { cell.textContent = '—'; cell.className = 'qty-cell'; }
  });
  document.getElementById('th-total').textContent = 'Total';
  const totalEl = document.getElementById('portions-total');
  if (totalEl) totalEl.style.display = 'none';
  lastPortions = null;
  document.getElementById('btn-export-header').disabled = true;
}

// ── Export ────────────────────────────────────────────────────────────────────
async function exportExcelCurrent() {
  if (!currentCode || !lastPortions) return;
  await doExport(currentCode, lastPortions);
}

async function doExport(code, portions) {
  const res = await fetch(`${API}/api/recipes/${code}/export`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ portions }),
  });
  if (!res.ok) { alert('Error exportando'); return; }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = res.headers.get('Content-Disposition')?.match(/filename=(.+)/)?.[1] || 'receta.xlsx';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmt(n) {
  if (n === null || n === undefined || n === '—') return '—';
  return Number(n).toLocaleString('es-ES', { maximumFractionDigits: 3 });
}
function round3(n) { return Math.round(n * 1000) / 1000; }

init();
</script>
